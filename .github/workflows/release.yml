name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 直前のリリースタグから1つ増分する(オドメーター式の桁上げ): 1.0.1→1.0.2→…→1.0.9→1.1.0→…→1.9.9→2.0.0
          $latestTag = gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq ".[0].tagName"
          if (-not $latestTag) { $latestTag = "v0.0.0" }

          $parts = $latestTag.TrimStart("v").Split(".")
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          $patch++
          if ($patch -ge 10) { $patch = 0; $minor++ }
          if ($minor -ge 10) { $minor = 0; $major++ }

          $version = "$major.$minor.$patch"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish framework-dependent build
        run: >
          dotnet publish src/KabeCale.App/KabeCale.App.csproj
          -c Release -r win-x64 --self-contained false
          -p:Version=${{ steps.version.outputs.version }}
          -o publish

      - name: Build installer
        shell: pwsh
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.version }}
          /DMyPublishDir="${{ github.workspace }}\publish"
          /DMyOutputDir="${{ github.workspace }}\dist"
          installer\setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          make_latest: true
          files: dist/*.exe

name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          # push毎にrun_numberを10進カウンタとして扱う: 1→0.1, 9→0.9, 10→1.0, 11→1.1 ...
          $runNumber = [int]"${{ github.run_number }}"
          $major = [math]::Floor($runNumber / 10)
          $minor = $runNumber % 10
          $version = "$major.$minor"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish self-contained build
        run: >
          dotnet publish src/KabeCale.App/KabeCale.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -o publish

      - name: Build installer
        shell: pwsh
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.version.outputs.version }}
          /DMyPublishDir="${{ github.workspace }}\publish"
          /DMyOutputDir="${{ github.workspace }}\dist"
          installer\setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          make_latest: true
          files: dist/*.exe
